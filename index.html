<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>רעיונות לתוכן</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="login-screen" class="screen">
  <div class="login-card">
    <h1>רעיונות לתוכן</h1>
    <button id="google-signin-btn" class="btn-primary">התחברות עם Google</button>
    <p id="login-error" class="error-text" hidden></p>
  </div>
</div>

<div id="app-screen" class="screen" hidden>
  <header class="app-header">
    <h1>רעיונות לתוכן</h1>
    <nav class="view-tabs">
      <button id="tab-archive" class="tab-btn active">מאגר וחיפוש</button>
      <button id="tab-chat" class="tab-btn">בדיקת רעיון</button>
    </nav>
    <button id="signout-btn" class="btn-text">התנתקות</button>
  </header>

  <button id="random-idea-btn" class="random-btn">🎲 אין לי רעיון</button>

  <main id="archive-view" class="view">
    <div class="archive-controls">
      <input id="search-input" type="text" placeholder="חיפוש לפי כותרת או טקסט...">
      <select id="filter-category">
        <option value="">כל הקטגוריות</option>
        <option value="בעל ערך">בעל ערך</option>
        <option value="אישי">אישי</option>
        <option value="מכירתי">מכירתי</option>
        <option value="בידורי">בידורי</option>
      </select>
      <select id="filter-viral">
        <option value="">ויראלי - הכל</option>
        <option value="כן">ויראלי: כן</option>
        <option value="לא">ויראלי: לא</option>
      </select>
      <select id="filter-persuasion">
        <option value="">כל שלבי השכנוע</option>
        <option value="שלב שכנוע 1 - מודעות לבעיה / חומרת הבעיה">שלב שכנוע 1</option>
        <option value="שלב שכנוע 2 - מודעות לפתרון">שלב שכנוע 2</option>
        <option value="שלב שכנוע 3 - למה דווקא אני">שלב שכנוע 3</option>
      </select>
      <select id="filter-rating">
        <option value="">כל הדירוגים</option>
        <option value="🔥 חייב לצלם">🔥 חייב לצלם</option>
        <option value="⭐ שווה לצלם">⭐ שווה לצלם</option>
        <option value="💭 רעיון לעתיד">💭 רעיון לעתיד</option>
      </select>
    </div>
    <ul class="archive-list" id="archive-list"></ul>
  </main>

  <main id="chat-view" class="view" hidden>
    <div class="chat-messages" id="chat-messages">
      <div class="chat-bubble chat-bubble-assistant">
        היי! ספרי לי מה הרעיון לתוכן שאת חושבת עליו, ולמי הוא מיועד (קהל היעד) - ונבדוק ביחד אם הוא מספיק חזק. 💡
      </div>
    </div>
    <form id="chat-form" class="chat-input-row">
      <textarea id="chat-input" placeholder="כתבי כאן את הרעיון וקהל היעד..." required></textarea>
      <button type="submit" class="btn-primary">שליחה</button>
    </form>
  </main>

  <button id="add-idea-fab" class="fab">+ הוסיפי רעיון</button>
</div>

<div id="idea-modal" class="modal" hidden>
  <div class="modal-content">
    <h2 id="modal-title">רעיון חדש</h2>
    <form id="idea-form">
      <label>הרעיון<input id="field-title" type="text" required></label>
      <label>קטגוריה
        <select id="field-category" required>
          <option value="בעל ערך">בעל ערך</option>
          <option value="אישי">אישי</option>
          <option value="מכירתי">מכירתי</option>
          <option value="בידורי">בידורי</option>
        </select>
      </label>
      <label>פירוט<textarea id="field-hook"></textarea></label>
      <label>לינק לסרטון (במידה ויש)<input id="field-link" type="url"></label>
      <label>מקור הרעיון
        <select id="field-source">
          <option value="">בחרי מקור</option>
          <option value="אינסטגרם">אינסטגרם</option>
          <option value="טיקטוק">טיקטוק</option>
          <option value="לקוחות">לקוחות</option>
          <option value="מהראש">מהראש</option>
          <option value="שיחה עם חברים / משפחה">שיחה עם חברים / משפחה</option>
          <option value="פודקאסט">פודקאסט</option>
          <option value="ספר">ספר</option>
          <option value="אחר">אחר</option>
        </select>
      </label>
      <label>שלב שכנוע
        <select id="field-persuasion">
          <option value="">בחרי שלב שכנוע</option>
          <option value="שלב שכנוע 1 - מודעות לבעיה / חומרת הבעיה">שלב שכנוע 1 - מודעות לבעיה / חומרת הבעיה</option>
          <option value="שלב שכנוע 2 - מודעות לפתרון">שלב שכנוע 2 - מודעות לפתרון</option>
          <option value="שלב שכנוע 3 - למה דווקא אני">שלב שכנוע 3 - למה דווקא אני</option>
        </select>
      </label>
      <label>דירוג
        <select id="field-rating">
          <option value="">בחרי דירוג</option>
          <option value="🔥 חייב לצלם">🔥 חייב לצלם</option>
          <option value="⭐ שווה לצלם">⭐ שווה לצלם</option>
          <option value="💭 רעיון לעתיד">💭 רעיון לעתיד</option>
        </select>
      </label>
      <label>פוטנציאל ויראליות
        <select id="field-viral">
          <option value="לא">לא</option>
          <option value="כן">כן</option>
        </select>
      </label>
      <p id="form-error" class="error-text" hidden></p>
      <div class="modal-actions">
        <button type="button" id="delete-idea-btn" class="btn-danger" hidden>מחיקה</button>
        <button type="button" id="cancel-idea-btn" class="btn-text">ביטול</button>
        <button type="submit" class="btn-primary">שמירה</button>
      </div>
    </form>
  </div>
</div>

<div id="random-modal" class="modal random-modal" hidden>
  <div class="modal-content random-modal-content">
    <div id="random-spinner" class="random-spinner" hidden></div>
    <div id="random-result" class="random-result" hidden></div>
    <div class="modal-actions random-modal-actions">
      <button type="button" id="random-again-btn" class="btn-primary" hidden>רעיון אחר 🎲</button>
      <button type="button" id="random-close-btn" class="btn-text">סגירה</button>
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
